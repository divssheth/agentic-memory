name: travel-agent-memory
metadata:
  template: travel-agent-memory
  description: Corporate travel assistant with agentic memory

hooks:
  postprovision:
    shell: pwsh
    run: |
      Write-Host "Post-provisioning: Creating Cosmos DB containers..."
      az cosmosdb sql container create `
        --account-name $env:COSMOS_ACCOUNT `
        --database-name "travel-memory" `
        --name "memories" `
        --partition-key-path "/employee_id" `
        --resource-group $env:RESOURCE_GROUP
      
      az cosmosdb sql container create `
        --account-name $env:COSMOS_ACCOUNT `
        --database-name "travel-memory" `
        --name "travel-requests" `
        --partition-key-path "/employee_id" `
        --resource-group $env:RESOURCE_GROUP
